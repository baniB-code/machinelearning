<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CogniSense CX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { width: 100%; max-width: 440px; padding: 2.5rem; border-radius: var(--radius-lg); border: 1px solid var(--glass-border); background: var(--bg-card); backdrop-filter: var(--glass-blur); }
    .auth-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
    .auth-logo .logo-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .auth-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.25rem; }
    .auth-sub   { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .auth-form .form-group { margin-bottom: 1.1rem; }
    .auth-form label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.4rem; }
    .auth-form input { width: 100%; padding: 0.7rem 1rem; border-radius: var(--radius); border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: var(--text-primary); font-size: 0.9rem; outline: none; transition: var(--transition); box-sizing: border-box; font-family: inherit; }
    .auth-form input:focus { border-color: var(--accent-purple); }
    .auth-form input::placeholder { color: var(--text-muted); }
    .auth-btn { width: 100%; padding: 0.8rem; margin-top: 0.5rem; border-radius: var(--radius); background: var(--gradient-primary); color: #fff; font-size: 0.95rem; font-weight: 700; border: none; cursor: pointer; transition: var(--transition); }
    .auth-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.83rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-purple); text-decoration: none; font-weight: 600; }
    .error-msg   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: #f87171; padding: 0.7rem 1rem; border-radius: var(--radius); font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .success-msg { background: rgba(16,217,138,0.1); border: 1px solid rgba(16,217,138,0.3); color: #10d98a; padding: 0.7rem 1rem; border-radius: var(--radius); font-size: 0.83rem; margin-bottom: 1rem; display: none; }

    /* Role toggle */
    .role-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1.25rem; }
    .role-opt { padding: 0.85rem; border-radius: var(--radius); border: 2px solid var(--glass-border); cursor: pointer; text-align: center; transition: var(--transition); }
    .role-opt:hover { border-color: rgba(124,110,245,0.5); }
    .role-opt.selected { border-color: var(--accent-purple); background: rgba(124,110,245,0.12); }
    .role-opt .r-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .role-opt .r-label { font-size: 0.82rem; font-weight: 700; }
    .role-opt .r-sub   { font-size: 0.72rem; color: var(--text-muted); }
    .back-link { position: absolute; top: 2rem; left: 2rem; color: var(--text-primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: var(--transition); display: flex; align-items: center; gap: 0.5rem; background: var(--bg-tertiary); padding: 0.6rem 1rem; border-radius: var(--radius); border: 1px solid var(--glass-border); }
    .back-link:hover { background: var(--bg-card-hover); border-color: var(--accent-purple); transform: translateY(-2px); }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back to Home</a>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🧠</div>
      <div>
        <div style="font-weight:900; font-size:1.1rem;">CogniSense CX</div>
        <div style="font-size:0.72rem; color:var(--text-muted);">AI Complaint Intelligence</div>
      </div>
    </div>

    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Join CogniSense CX to get started.</div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Role selector -->
    <div style="font-size:0.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:0.5rem;">I am a…</div>
    <div class="role-toggle">
      <div class="role-opt selected" data-role="client" id="roleClient" onclick="selectRole('client')">
        <div class="r-icon">👤</div>
        <div class="r-label">Client</div>
        <div class="r-sub">Submit &amp; track complaints</div>
      </div>
      <div class="role-opt" data-role="admin" id="roleAdmin" onclick="selectRole('admin')">
        <div class="r-icon">🛡️</div>
        <div class="r-label">Admin / Staff</div>
        <div class="r-sub">Manage &amp; respond to complaints</div>
      </div>
    </div>

    <form class="auth-form" id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Jane Doe" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--text-muted);font-weight:400;">(min 6 chars)</span></label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••" required />
      </div>
      <input type="hidden" id="selectedRole" value="client" />
      <button type="submit" class="auth-btn">Create Account →</button>
    </form>

    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    const sess = Auth.getSession();
    if (sess) window.location.href = sess.role === 'admin' ? 'admin-dashboard.html' : 'client-complaints.html';

    function selectRole(role) {
      document.getElementById('selectedRole').value = role;
      document.getElementById('roleClient').classList.toggle('selected', role === 'client');
      document.getElementById('roleAdmin').classList.toggle('selected',  role === 'admin');
    }

    document.getElementById('registerForm').addEventListener('submit', e => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const role     = document.getElementById('selectedRole').value;
      const errEl    = document.getElementById('errorMsg');
      const okEl     = document.getElementById('successMsg');
      errEl.style.display = 'none'; okEl.style.display = 'none';

      if (!name || !email || !password || !confirm) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
      if (password.length < 6)  { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }

      const result = Auth.register({ name, email, password, role });
      if (!result.ok) { errEl.textContent = result.error; errEl.style.display = 'block'; return; }

      okEl.textContent = '✅ Account created! Redirecting…';
      okEl.style.display = 'block';
      setTimeout(() => { window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'client-complaints.html'; }, 900);
    });
  </script>
</body>
</html>
