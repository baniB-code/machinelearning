<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Chat — CogniSense CX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/app-layout.css" />
  <style>
    .chat-layout { display:grid; grid-template-columns:300px 1fr; gap:1.5rem; height:calc(100vh - 120px); }
    @media(max-width:820px){ .chat-layout{grid-template-columns:1fr;height:auto;} .detail-col{display:none;} }
    .detail-col { display:flex; flex-direction:column; gap:1rem; overflow-y:auto; }
    .detail-card { padding:1.25rem; border-radius:var(--radius-lg); border:1px solid var(--glass-border); background:var(--bg-card); }
    .chat-col { display:flex; flex-direction:column; border-radius:var(--radius-lg); border:1px solid var(--glass-border); background:var(--bg-card); overflow:hidden; }
    .chat-h { padding:1rem 1.25rem; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; gap:0.75rem; flex-shrink:0; }
    .ch-av { width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#10d98a,#4f9eff);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:0.9rem;flex-shrink:0; }
    .chat-thread { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:0.85rem; }
    .chat-thread::-webkit-scrollbar{width:3px;} .chat-thread::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:999px;}
    .chat-msg { display:flex; gap:0.65rem; max-width:82%; animation:msgIn 0.25s ease; }
    @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .chat-msg.mine { align-self:flex-end; flex-direction:row-reverse; }
    .msg-av{ width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px; }
    .msg-av.admin-av  { background:var(--gradient-primary); }
    .msg-av.client-av { background:linear-gradient(135deg,#10d98a,#4f9eff); }
    .bubble { padding:0.65rem 0.9rem; border-radius:12px; font-size:0.875rem; line-height:1.55; }
    .chat-msg:not(.mine) .bubble { background:var(--bg-tertiary); border:1px solid var(--glass-border); border-bottom-left-radius:3px; }
    .chat-msg.mine .bubble      { background:var(--accent-purple); color:#fff; border-bottom-right-radius:3px; }
    .msg-time { font-size:0.68rem; color:var(--text-muted); margin-top:0.25rem; }
    .chat-msg.mine .msg-time { text-align:right; }
    .compose { padding:1rem 1.25rem; border-top:1px solid var(--glass-border); display:flex; flex-direction:column; gap:0.6rem; flex-shrink:0; }
    .compose-row { display:flex; gap:0.6rem; align-items:flex-end; }
    .compose-ta { flex:1;padding:0.65rem 0.9rem;background:var(--bg-tertiary);border:1px solid var(--glass-border);border-radius:var(--radius);color:var(--text-primary);font-size:0.875rem;resize:none;outline:none;font-family:inherit;line-height:1.5;min-height:40px;max-height:110px;transition:var(--transition); }
    .compose-ta:focus{border-color:var(--accent-purple);}
    .send-btn{padding:0.65rem 1.1rem;background:var(--gradient-primary);color:#fff;border:none;border-radius:var(--radius);font-size:0.875rem;font-weight:700;cursor:pointer;transition:var(--transition);white-space:nowrap;}
    .send-btn:hover{opacity:0.88;transform:translateY(-1px);}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
    .qr-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .qr-btn { padding:0.3rem 0.7rem; border-radius:999px; font-size:0.74rem; cursor:pointer; border:1px solid var(--glass-border); background:var(--bg-tertiary); color:var(--text-secondary); transition:var(--transition); white-space:nowrap; }
    .qr-btn:hover { background:rgba(124,110,245,0.15); border-color:var(--accent-purple); color:var(--text-primary); }
    .status-sel { padding:0.45rem 0.7rem; background:var(--bg-tertiary); border:1px solid var(--glass-border); border-radius:var(--radius); color:var(--text-primary); font-size:0.82rem; outline:none; font-family:inherit; cursor:pointer; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-main">
    <div class="page-topbar" style="margin-bottom:1.25rem;">
      <div>
        <div class="section-tag">💬 Admin Portal</div>
        <h1 style="font-size:1.4rem;font-weight:900;margin-top:0.25rem;" id="pageTitle">Complaint Chat</h1>
      </div>
      <a href="admin-complaints.html" class="btn btn-outline btn-sm">← All Complaints</a>
    </div>

    <div class="chat-layout">
      <!-- Detail column -->
      <div class="detail-col">
        <div class="detail-card">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.75rem;">📋 Complaint Info</div>
          <div id="detailContent">Loading…</div>
        </div>
        <div class="detail-card">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.75rem;">🤖 AI Analysis</div>
          <div id="aiContent">–</div>
        </div>
        <div class="detail-card">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.75rem;">🔄 Update Status</div>
          <select class="status-sel" id="statusSel" style="width:100%;">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Resolved</option>
          </select>
          <button class="btn btn-primary btn-sm" style="width:100%;margin-top:0.65rem;" id="updateStatusBtn">Save Status</button>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat-col">
        <div class="chat-h">
          <div class="ch-av" id="chatAv">C</div>
          <div style="flex:1;">
            <div style="font-size:0.9rem;font-weight:800;" id="chatWith">Client</div>
            <div style="font-size:0.74rem;color:var(--text-muted);" id="chatSub">Complaint thread</div>
          </div>
        </div>
        <div class="chat-thread" id="chatThread"><div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:0.85rem;">Loading…</div></div>
        <div class="compose">
          <div class="qr-row" id="quickReplies"></div>
          <div class="compose-row">
            <textarea class="compose-ta" id="composeInput" placeholder="Reply to client… (Enter to send)" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>Send ✈️</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/ml-engine.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/complaint-store.js"></script>
<script>
  if (!requireAuth('admin')) throw new Error('Not authenticated');
  const session = Auth.getSession();
  Layout.render('admin-messaging.html');

  const params = new URLSearchParams(window.location.search);
  const cid    = params.get('id');
  if (!cid) { window.location.href = 'admin-complaints.html'; }

  const complaint = ComplaintStore.getById(cid);
  if (!complaint) { showBanner('Unable to load complaint details.', 'error'); window.location.href = 'admin-complaints.html'; }

  document.getElementById('pageTitle').textContent  = complaint.title;
  document.getElementById('chatWith').textContent   = complaint.userName || 'Client';
  document.getElementById('chatAv').textContent     = (complaint.userName || 'C')[0].toUpperCase();
  document.getElementById('chatSub').textContent    = complaint.classification?.category || 'Complaint thread';

  const sentColor = { Positive:'#10d98a', Negative:'#f87171', Neutral:'#9197ba' }[complaint.sentiment?.label] || '#9197ba';
  const priColor  = { High:'#f87171', Medium:'#fbbf24', Low:'#10d98a' }[complaint.priority?.level] || '#9197ba';
  const stColors  = { Pending:'#fbbf24', 'In Progress':'#4f9eff', Resolved:'#10d98a' };
  const stColor   = stColors[complaint.status] || '#9197ba';

  document.getElementById('detailContent').innerHTML = `
    <div style="font-weight:700;font-size:0.88rem;margin-bottom:0.4rem;">${escHtml(complaint.title)}</div>
    <p style="font-size:0.8rem;color:var(--text-secondary);line-height:1.55;margin-bottom:0.65rem;">${escHtml(complaint.description || complaint.text || '')}</p>
    <div style="display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;">
      <span class="badge" style="background:${stColor}20;color:${stColor};border:1px solid ${stColor}40;" id="statusBadge">${complaint.status}</span>
      <span style="font-size:0.72rem;color:var(--text-muted);">${formatTimeAgo(complaint.createdAt || complaint.timestamp)}</span>
    </div>
  `;
  document.getElementById('aiContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0.5rem;">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;"><span style="color:var(--text-muted);">Sentiment</span><span style="color:${sentColor};font-weight:700;">${complaint.sentiment?.emoji||''} ${complaint.sentiment?.label||'–'}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;"><span style="color:var(--text-muted);">Category</span><span style="color:var(--text-primary);font-weight:700;">${complaint.classification?.icon||''} ${complaint.classification?.category||complaint.category||'–'}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;"><span style="color:var(--text-muted);">Priority</span><span style="color:${priColor};font-weight:700;">${complaint.priority?.icon||''} ${complaint.priority?.level||'–'} (${complaint.priority?.score||0}/100)</span></div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;"><span style="color:var(--text-muted);">Sentiment Conf.</span><span style="font-weight:700;">${complaint.sentiment?.confidence||0}%</span></div>
    </div>
  `;

  // Status
  const stSel = document.getElementById('statusSel');
  stSel.value = complaint.status || 'Pending';
  document.getElementById('updateStatusBtn').addEventListener('click', () => {
    const updated = withLoading(document.getElementById('updateStatusBtn'), 'Saving…', () => ComplaintStore.updateStatus(cid, stSel.value));
    if (!updated) { showBanner('Failed to update status. Please retry.', 'error'); return; }
    const c = stColors[stSel.value] || '#9197ba';
    document.getElementById('statusBadge').textContent = stSel.value;
    document.getElementById('statusBadge').style.cssText = `background:${c}20;color:${c};border:1px solid ${c}40;`;
    clearBanner();
    showToast(`Status set to "${stSel.value}"`, 'success');
  });

  // Quick replies
  const QRS = [
    'Thank you for reaching out. We are looking into your issue.',
    'We apologize for the inconvenience and are working on a resolution.',
    'Could you please provide more details so we can assist you better?',
    'Your complaint has been escalated to our specialist team.',
    'We are happy to confirm that your issue has been resolved. Please let us know if you need further assistance.',
    'A refund has been processed and should appear in 3-5 business days.',
  ];
  document.getElementById('quickReplies').innerHTML = QRS.map((q, i) => `<button class="qr-btn" data-i="${i}">${truncate(q, 38)}</button>`).join('');
  document.getElementById('quickReplies').addEventListener('click', e => {
    const btn = e.target.closest('.qr-btn');
    if (!btn) return;
    const inp = document.getElementById('composeInput');
    inp.value = QRS[btn.dataset.i];
    inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
  });

  // Chat
  function renderThread() {
    const msgs = ComplaintStore.getMessages(cid);
    if (msgs === null) {
      showBanner('Chat sync failed. Retrying automatically…', 'error');
      return;
    }
    clearBanner();
    const el   = document.getElementById('chatThread');
    if (!msgs.length) { el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:0.85rem;">No messages yet.</div>'; return; }
    let lastDate = '';
    el.innerHTML = msgs.map(m => {
      const d  = m.time ? new Date(m.time).toLocaleDateString() : '';
      let div  = '';
      if (d && d !== lastDate) { lastDate = d; div = `<div style="text-align:center;font-size:0.68rem;color:var(--text-muted);padding:0.25rem 0;position:relative;"><span style="background:var(--bg-card);padding:0 0.5rem;">${d}</span></div>`; }
      const isAdmin = m.senderRole === 'admin' || m.senderId === session.id;
      const av = isAdmin
        ? `<div class="msg-av admin-av">A</div>`
        : `<div class="msg-av client-av">${(m.senderName || 'C')[0].toUpperCase()}</div>`;
      return `${div}<div class="chat-msg${isAdmin ? ' mine' : ''}">
        ${av}
        <div>
          <div class="bubble">${escHtml(m.text)}</div>
          <div class="msg-time">${escHtml(m.senderName || '')}&nbsp;·&nbsp;${m.time ? formatTimeAgo(m.time) : ''}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  const inp  = document.getElementById('composeInput');
  const sbtn = document.getElementById('sendBtn');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    sbtn.disabled = inp.value.trim() === '';
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sbtn.addEventListener('click', send);

  function send() {
    const text = inp.value.trim();
    if (!text) return;
    const sent = withLoading(sbtn, 'Sending…', () => ComplaintStore.addMessage(cid, { senderId: session.id, senderName: 'Admin', senderRole: 'admin', text }));
    if (!sent) { showBanner('Message failed to send. Check connection and retry.', 'error'); return; }
    inp.value = ''; inp.style.height = 'auto'; sbtn.disabled = true;
    // Auto-set status to In Progress if Pending
    const c = ComplaintStore.getById(cid);
    if (c?.status === 'Pending') { ComplaintStore.updateStatus(cid, 'In Progress'); stSel.value = 'In Progress'; }
    renderThread();
    clearBanner();
    showToast('Message sent', 'success');
  }

  function showToast(msg, type='info') {
    const cnt = document.getElementById('toast-container');
    const t = document.createElement('div');
    const colors = { success:'#10d98a', error:'#f87171', info:'#4f9eff' };
    t.style.cssText = `background:var(--bg-secondary);border:1px solid ${colors[type]};color:var(--text-primary);padding:0.75rem 1.25rem;border-radius:var(--radius);margin-top:0.5rem;font-size:0.85rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);`;
    t.textContent = msg; cnt.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  renderThread();
  const threadAutoRefresh = setInterval(renderThread, 5000);
  window.addEventListener('beforeunload', () => clearInterval(threadAutoRefresh));
</script>
</body>
</html>
