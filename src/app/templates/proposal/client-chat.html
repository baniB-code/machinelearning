<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint Chat — CogniSense CX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/app-layout.css" />
  <style>
    .chat-layout { display:grid; grid-template-columns:320px 1fr; gap:1.5rem; height:calc(100vh - 120px); }
    @media(max-width:820px){ .chat-layout{grid-template-columns:1fr;height:auto;} .detail-col{display:none;} }
    .detail-col { display:flex; flex-direction:column; gap:1rem; overflow-y:auto; }
    .chat-col { display:flex; flex-direction:column; border-radius:var(--radius-lg); border:1px solid var(--glass-border); background:var(--bg-card); overflow:hidden; }
    .chat-h { padding:1rem 1.25rem; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; gap:0.75rem; flex-shrink:0; }
    .ch-av { width:38px; height:38px; border-radius:50%; background:var(--gradient-primary); display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:0.9rem;flex-shrink:0; }
    .chat-thread { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:0.85rem; }
    .chat-thread::-webkit-scrollbar{width:3px;} .chat-thread::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:999px;}
    .chat-msg { display:flex; gap:0.65rem; max-width:82%; animation:msgIn 0.25s ease; }
    @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .chat-msg.mine { align-self:flex-end; flex-direction:row-reverse; }
    .msg-av { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px; }
    .msg-av.admin-av  { background:var(--gradient-primary); }
    .msg-av.client-av { background:linear-gradient(135deg,#10d98a,#4f9eff); }
    .bubble { padding:0.65rem 0.9rem; border-radius:12px; font-size:0.875rem; line-height:1.55; }
    .chat-msg:not(.mine) .bubble { background:var(--bg-tertiary); border:1px solid var(--glass-border); border-bottom-left-radius:3px; }
    .chat-msg.mine .bubble      { background:var(--accent-purple); color:#fff; border-bottom-right-radius:3px; }
    .msg-time { font-size:0.68rem; color:var(--text-muted); margin-top:0.25rem; }
    .chat-msg.mine  .msg-time { text-align:right; }
    .compose { padding:1rem 1.25rem; border-top:1px solid var(--glass-border); display:flex; gap:0.6rem; align-items:flex-end; flex-shrink:0; }
    .compose-ta { flex:1;padding:0.65rem 0.9rem;background:var(--bg-tertiary);border:1px solid var(--glass-border);border-radius:var(--radius);color:var(--text-primary);font-size:0.875rem;resize:none;outline:none;font-family:inherit;line-height:1.5;min-height:40px;max-height:110px;transition:var(--transition); }
    .compose-ta:focus{border-color:var(--accent-purple);}
    .send-btn{padding:0.65rem 1.1rem;background:var(--gradient-primary);color:#fff;border:none;border-radius:var(--radius);font-size:0.875rem;font-weight:700;cursor:pointer;transition:var(--transition);white-space:nowrap;}
    .send-btn:hover{opacity:0.88;transform:translateY(-1px);}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
    .date-divider{text-align:center;font-size:0.68rem;color:var(--text-muted);padding:0.25rem 0;position:relative;}
    .date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--glass-border);}
    .date-divider::before{left:0;} .date-divider::after{right:0;}
    .detail-card { padding:1.25rem; border-radius:var(--radius-lg); border:1px solid var(--glass-border); background:var(--bg-card); }
    .status-select { width:100%;padding:0.55rem 0.75rem;background:var(--bg-tertiary);border:1px solid var(--glass-border);border-radius:var(--radius);color:var(--text-primary);font-size:0.85rem;outline:none;font-family:inherit; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-main">
    <div class="page-topbar" style="margin-bottom:1.25rem;">
      <div>
        <div class="section-tag">💬 Client Portal</div>
        <h1 style="font-size:1.4rem;font-weight:900;margin-top:0.25rem;" id="pageTitle">Complaint Chat</h1>
      </div>
      <a href="client-complaints.html" class="btn btn-outline btn-sm">← My Complaints</a>
    </div>

    <div class="chat-layout">
      <!-- Detail column -->
      <div class="detail-col" id="detailCol">
        <div class="detail-card">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.75rem;">📋 Complaint Details</div>
          <div id="detailContent">Loading…</div>
        </div>
        <div class="detail-card">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.75rem;">🤖 AI Analysis</div>
          <div id="aiContent">–</div>
        </div>
      </div>

      <!-- Chat column -->
      <div class="chat-col">
        <div class="chat-h">
          <div class="ch-av" id="chatAvatar">A</div>
          <div style="flex:1;">
            <div style="font-size:0.9rem;font-weight:800;" id="chatWith">Support Team</div>
            <div style="font-size:0.74rem;color:var(--text-muted);" id="chatStatus">Online</div>
          </div>
        </div>
        <div class="chat-thread" id="chatThread"><div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:0.85rem;">Loading messages…</div></div>
        <div class="compose">
          <textarea class="compose-ta" id="composeInput" placeholder="Type your message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
          <button class="send-btn" id="sendBtn" disabled>Send ✈️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/ml-engine.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/complaint-store.js"></script>
<script>
  if (!requireAuth('client')) throw new Error('Not authenticated');
  const session = Auth.getSession();
  Layout.render('client-complaints.html');

  const params = new URLSearchParams(window.location.search);
  const cid    = params.get('id');
  if (!cid) { window.location.href = 'client-complaints.html'; }

  const complaint = ComplaintStore.getById(cid);
  if (!complaint || complaint.userId !== session.id) { showBanner('Unable to access this complaint thread.', 'error'); window.location.href = 'client-complaints.html'; }

  document.getElementById('pageTitle').textContent = complaint.title;

  // Render detail panel
  const sentColor = { Positive:'#10d98a', Negative:'#f87171', Neutral:'#9197ba' }[complaint.sentiment?.label] || '#9197ba';
  const priColor  = { High:'#f87171', Medium:'#fbbf24', Low:'#10d98a' }[complaint.priority?.level] || '#9197ba';
  const stColors  = { Pending:'#fbbf24', 'In Progress':'#4f9eff', Resolved:'#10d98a' };
  const stColor   = stColors[complaint.status] || '#9197ba';

  document.getElementById('detailContent').innerHTML = `
    <div style="font-weight:700;font-size:0.92rem;margin-bottom:0.5rem;">${escHtml(complaint.title)}</div>
    <p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.55;margin-bottom:0.75rem;">${escHtml(complaint.description || complaint.text || '')}</p>
    <div style="display:flex;flex-wrap:wrap;gap:0.4rem;">
      <span class="badge" style="background:${stColor}20;color:${stColor};border:1px solid ${stColor}40;">${complaint.status}</span>
      <span style="font-size:0.72rem;color:var(--text-muted);">${formatTimeAgo(complaint.createdAt || complaint.timestamp)}</span>
    </div>
  `;
  document.getElementById('aiContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0.5rem;">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;">
        <span style="color:var(--text-muted);">Sentiment</span>
        <span style="color:${sentColor};font-weight:700;">${complaint.sentiment?.emoji || ''} ${complaint.sentiment?.label || '–'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;">
        <span style="color:var(--text-muted);">Category</span>
        <span style="color:var(--text-primary);font-weight:700;">${complaint.classification?.icon || ''} ${complaint.classification?.category || complaint.category || '–'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;">
        <span style="color:var(--text-muted);">Priority</span>
        <span style="color:${priColor};font-weight:700;">${complaint.priority?.icon || ''} ${complaint.priority?.level || '–'} (${complaint.priority?.score || 0}/100)</span>
      </div>
    </div>
  `;

  // Chat
  function renderThread() {
    const msgs = ComplaintStore.getMessages(cid);
    if (msgs === null) {
      showBanner('Live chat sync failed. Retrying…', 'error');
      return;
    }
    clearBanner();
    const el   = document.getElementById('chatThread');
    if (!msgs.length) { el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:0.85rem;">No messages yet. Start the conversation!</div>'; return; }
    let lastDate = '';
    el.innerHTML = msgs.map(m => {
      const d  = m.time ? new Date(m.time).toLocaleDateString() : '';
      let div  = '';
      if (d && d !== lastDate) { lastDate = d; div = `<div class="date-divider">${d}</div>`; }
      const isMe = m.senderId === session.id;
      const av = isMe
        ? `<div class="msg-av client-av">${session.name[0].toUpperCase()}</div>`
        : `<div class="msg-av admin-av">A</div>`;
      return `${div}<div class="chat-msg${isMe ? ' mine' : ''}">
        ${av}
        <div>
          <div class="bubble">${escHtml(m.text)}</div>
          <div class="msg-time">${m.senderName ? escHtml(m.senderName) + ' · ' : ''}${m.time ? formatTimeAgo(m.time) : ''}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  const inp  = document.getElementById('composeInput');
  const sbtn = document.getElementById('sendBtn');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    sbtn.disabled = inp.value.trim() === '';
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sbtn.addEventListener('click', send);

  function send() {
    const text = inp.value.trim();
    if (!text) return;
    const sent = withLoading(sbtn, 'Sending…', () => ComplaintStore.addMessage(cid, { senderId: session.id, senderName: session.name, senderRole: 'client', text }));
    if (!sent) { showBanner('Message not sent. Please retry.', 'error'); return; }
    inp.value = ''; inp.style.height = 'auto'; sbtn.disabled = true;
    renderThread();
    clearBanner();
  }

  renderThread();
  // Poll for admin replies every 5s
  const threadAutoRefresh = setInterval(renderThread, 5000);
  window.addEventListener('beforeunload', () => clearInterval(threadAutoRefresh));
</script>
</body>
</html>
